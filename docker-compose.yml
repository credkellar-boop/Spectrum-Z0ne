services:
  ai-bridge:
    build: ./ai_service
    container_name: spectrum_ai_engine
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./ai_service:/app
      - /dev:/dev  # Access to hardware devices
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/i2c-1:/dev/i2c-1"
    privileged: true # Required for hardware control

  hardware-ctrl:
    build: ./1_firmware
    container_name: spectrum_hardware_ctrl
    restart: always
    volumes:
      - ./1_firmware:/app
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/i2c-1:/dev/i2c-1"
    privileged: true
