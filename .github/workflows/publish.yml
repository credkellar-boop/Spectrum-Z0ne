name: Publish to crates.io

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag, e.g., v0.1.8

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.Spec_trum_z0ne }}
        run: cargo publish