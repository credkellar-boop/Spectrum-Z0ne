name: Publish to crates.io

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag, e.g., v0.1.5

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.spectrum-z0ne-crates-io }} # Use the exact name you gave your secret
        run: cargo publish
